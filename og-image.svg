<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#FBF6ED"/>

  <!-- Large faded "30" in background -->
  <text x="600" y="480" text-anchor="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="500" fill="#E23B72" opacity="0.07"
        letter-spacing="-20">30</text>

  <!-- Decorative line top -->
  <line x1="400" y1="170" x2="800" y2="170" stroke="#E23B72" stroke-width="1.5" opacity="0.4"/>

  <!-- Main title: "Tre Tiår" in dark -->
  <text x="600" y="310" text-anchor="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="82" fill="#2B2B2B"
        letter-spacing="2">Tre Tiår</text>

  <!-- Main title: "med Tasken" in pink italic -->
  <text x="600" y="395" text-anchor="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="700" font-style="italic" font-size="82" fill="#E23B72"
        letter-spacing="2">med Tasken</text>

  <!-- Decorative line bottom -->
  <line x1="400" y1="430" x2="800" y2="430" stroke="#E23B72" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="600" y="490" text-anchor="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="28" fill="#2B2B2B" opacity="0.7"
        letter-spacing="4">11. APRIL 2026 — HOLMENKOLLEN LAVVO</text>

  <!-- Small decorative dots -->
  <circle cx="560" cy="210" r="3" fill="#E23B72" opacity="0.3"/>
  <circle cx="600" cy="210" r="3" fill="#E23B72" opacity="0.3"/>
  <circle cx="640" cy="210" r="3" fill="#E23B72" opacity="0.3"/>
</svg>
